# Alembic config for the Postgres school-domain schema.
# The database URL is NOT set here — backend/db/migrations/env.py sources it
# from backend.db.sql.get_engine() (Cloud SQL connector or DATABASE_URL), so
# migrations and the app use one connection surface.

[alembic]
script_location = backend/db/migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
